<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>

body{
font-family: Arial;
background-color: #f0f8ff;
text-align: center;
}

form{
background-color: white;
width: 300px;
margin: auto;
margin-top: 100px;
padding: 20px;
border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}

h2{
color: darkblue;
}

input{
width: 90%;
padding: 8px;
margin: 10px;
}

button{
background-color: green;
color: white;
padding: 10px 20px;
border: none;
border-radius: 5px;
}

</style>

</head>

<body>

<form>

<h2>Login Form</h2>

<label>Username:</label><br>
<input type="text" placeholder="Enter Username">

<br>

<label>Password:</label><br>
<input type="password" placeholder="Enter Password">

<br><br>

<button>Login</button>

</form>

</body>
</html>
